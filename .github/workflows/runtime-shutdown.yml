name: Runtime Shutdown

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to destroy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  destroy-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_REGION: us-east-2

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::323146836950:role/ImageGallery-GitHubActions-Dev
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform/aws/environments/${{ github.event.inputs.environment }}/runtime
        run: terraform init

      - name: Terraform Destroy
        working-directory: infra/terraform/aws/environments/${{ github.event.inputs.environment }}/runtime
        run: terraform destroy -auto-approve