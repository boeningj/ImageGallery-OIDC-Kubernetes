name: Runtime Shutdown

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to destroy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  destroy-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_REGION: us-east-2

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::323146836950:role/ImageGallery-GitHubActions-Dev
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform/aws/runtime
        run: |
          terraform init \
            -reconfigure \
            -backend-config="../env/${{ github.event.inputs.environment }}.runtime.backend.tfvars"

      # Kubernetes ingress resources managed by the AWS Load Balancer Controller
      # contain finalizers that must be removed before the namespace can be deleted.
      #
      # During Runtime Shutdown it was observed that Terraform occasionally deleted the
      # AWS Load Balancer Controller before it had finished cleaning up ingress
      # and TargetGroupBinding resources. This left the imagegallery namespace
      # stuck in the Terminating state and caused Terraform destroy to fail with:
      #
      #   Error: context deadline exceeded
      #
      # To avoid this race condition, delete the ingress and allow the ALB
      # Controller to process finalizers before Terraform starts destroying
      # runtime infrastructure.
      - name: Configure kubectl
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name imagegallery-cluster \
            --alias imagegallery-eks

      - name: Delete ingress
        continue-on-error: true
        run: |
          kubectl delete ingress imagegallery-ingress \
            -n imagegallery \
            --ignore-not-found=true

      - name: Wait for ingress deletion
        continue-on-error: true
        run: |
          kubectl wait \
            --for=delete ingress/imagegallery-ingress \
            -n imagegallery \
            --timeout=10m  || true

      - name: Terraform Destroy
        working-directory: infra/terraform/aws/runtime
        run: |
          terraform destroy \
            -auto-approve \
            -var-file="../env/${{ github.event.inputs.environment }}.runtime.tfvars"