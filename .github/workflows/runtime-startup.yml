name: Runtime Startup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  startup-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      AWS_REGION: us-east-2

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::323146836950:role/ImageGallery-GitHubActions-Dev
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform/aws/environments/${{ github.event.inputs.environment }}/runtime
        run: terraform init

      - name: Terraform Validate
        working-directory: infra/terraform/aws/environments/${{ github.event.inputs.environment }}/runtime
        run: terraform validate

      - name: Terraform Apply
        working-directory: infra/terraform/aws/environments/${{ github.event.inputs.environment }}/runtime
        run: terraform apply -auto-approve

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name imagegallery-cluster \
            --alias imagegallery-eks

      # Terraform can complete before Kubernetes nodes and
      # system workloads are fully ready. Wait for the cluster
      # to become healthy before deploying application manifests.
      - name: Wait for Nodes
        run: |
          kubectl wait \
            --for=condition=Ready nodes \
            --all \
            --timeout=10m

      # - name: Wait for Namespace
      #   run: |
      #     kubectl wait \
      #       --for=jsonpath='{.status.phase}'=Active \
      #       namespace/imagegallery \
      #       --timeout=5m

      # Application manifests create an ingress resource that
      # depends on the AWS Load Balancer Controller. Wait until
      # the controller is fully available before deploying workloads.
      - name: Wait for ALB Controller
        run: |
          kubectl rollout status \
            deployment/aws-load-balancer-controller \
            -n kube-system \
            --timeout=10m

      - name: Verify Namespace Exists
        run: |
          kubectl get namespace imagegallery

      - name: Create Application Secret
        run: |
          kubectl create secret generic imagegallery-common-secrets \
            --namespace imagegallery \
            --from-literal=Authentication__ClientSecret="${{ secrets.IMAGEGALLERY_CLIENT_SECRET }}" \
            --from-literal=Authentication__ApiClientSecret="${{ secrets.IMAGEGALLERY_API_CLIENT_SECRET }}" \
            --from-literal=ConnectionStrings__ImageGalleryDBConnectionString="${{ secrets.IMAGEGALLERY_CONNECTION_STRING }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Application Workloads
        run: |
          kubectl apply -f k8s/aws