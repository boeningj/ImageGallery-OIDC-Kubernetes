name: Runtime Startup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  startup-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      AWS_REGION: us-east-2

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::323146836950:role/ImageGallery-GitHubActions-Dev
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform/aws/runtime
        run: |
          terraform init \
            -reconfigure \
            -backend-config="../env/${{ github.event.inputs.environment }}.runtime.backend.tfvars"

      - name: Terraform Validate
        working-directory: infra/terraform/aws/runtime
        run: terraform validate

      - name: Terraform Apply
        working-directory: infra/terraform/aws/runtime
        run: |
          terraform apply \
            -auto-approve \
            -var-file="../env/${{ github.event.inputs.environment }}.runtime.tfvars"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name imagegallery-cluster \
            --alias imagegallery-eks

      # Terraform can complete before Kubernetes nodes and
      # system workloads are fully ready. Wait for the cluster
      # to become healthy before deploying application manifests.
      - name: Wait for Nodes
        run: |
          kubectl wait \
            --for=condition=Ready nodes \
            --all \
            --timeout=10m

      # - name: Wait for Namespace
      #   run: |
      #     kubectl wait \
      #       --for=jsonpath='{.status.phase}'=Active \
      #       namespace/imagegallery \
      #       --timeout=5m

      # Application manifests create an ingress resource that
      # depends on the AWS Load Balancer Controller. Wait until
      # the controller is fully available before deploying workloads.
      - name: Wait for ALB Controller
        run: |
          kubectl rollout status \
            deployment/aws-load-balancer-controller \
            -n kube-system \
            --timeout=10m

      - name: Verify Namespace Exists
        run: |
          kubectl get namespace imagegallery

      # ============================================================
      # CLOUDFLARE API TOKEN FOR EXTERNALDNS
      # ============================================================
      #
      # ExternalDNS manages DNS records automatically by calling
      # the Cloudflare API.
      #
      # The Cloudflare API token is stored securely as a GitHub
      # Actions secret and recreated as a Kubernetes Secret each
      # time the Runtime environment is started.
      #
      # WHY THIS IS NEEDED:
      # - Runtime Shutdown destroys the EKS cluster
      # - Kubernetes Secrets are lost when the cluster is destroyed
      # - Runtime Startup must recreate the secret before
      #   ExternalDNS can start successfully
      #
      # SECURITY:
      # - Token is stored in GitHub Secrets
      # - Token is NOT stored in Terraform state
      # - Token is scoped to DNS management for boeninglabs.net
      # ============================================================
      - name: Create Cloudflare Secret
        run: |
          kubectl create secret generic cloudflare-api-token \
            --namespace kube-system \
            --from-literal=api-token="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # TEMP VERIFICATION
      - name: Verify Helm
        run: |
          helm version

      # ============================================================
      # INSTALL EXTERNALDNS
      # ============================================================
      #
      # ExternalDNS watches Kubernetes Ingress resources and
      # automatically creates or updates DNS records in Cloudflare.
      #
      # WORKFLOW:
      #
      #   Ingress
      #       ↓
      #   AWS Load Balancer Controller
      #       ↓
      #   ALB Created
      #       ↓
      #   ExternalDNS Detects ALB Hostname
      #       ↓
      #   Cloudflare DNS Updated
      #
      # RESULT:
      #
      #   imagegallery.boeninglabs.net
      #
      # automatically points at the current AWS Application
      # Load Balancer after each Runtime Startup.
      #
      # This eliminates the need to manually update Cloudflare
      # whenever the Runtime environment is rebuilt.
      # ============================================================
      - name: Install ExternalDNS
        run: |
          helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
          helm repo update

          helm upgrade --install external-dns external-dns/external-dns \
            --namespace kube-system \
            --create-namespace \
            --set provider.name=cloudflare \
            --set env[0].name=CF_API_TOKEN \
            --set env[0].valueFrom.secretKeyRef.name=cloudflare-api-token \
            --set env[0].valueFrom.secretKeyRef.key=api-token \
            --set domainFilters[0]=boeninglabs.net \
            --set policy=sync \
            --set registry=txt \
            --set txtOwnerId=imagegallery

      # ============================================================
      # WAIT FOR EXTERNALDNS TO BECOME READY
      # ============================================================
      #
      # ExternalDNS must be fully running before application
      # workloads are deployed.
      #
      # This ensures:
      # - DNS reconciliation can begin immediately
      # - Startup failures are detected early
      # - Subsequent deployment steps do not proceed until the
      #   controller is healthy
      # ============================================================
      - name: Wait for ExternalDNS
        run: |
          kubectl rollout status \
            deployment/external-dns \
            -n kube-system \
            --timeout=10m

      - name: Create Application Secret
        run: |
          kubectl create secret generic imagegallery-common-secrets \
            --namespace imagegallery \
            --from-literal=Authentication__ClientSecret="${{ secrets.IMAGEGALLERY_CLIENT_SECRET }}" \
            --from-literal=Authentication__ApiClientSecret="${{ secrets.IMAGEGALLERY_API_CLIENT_SECRET }}" \
            --from-literal=ConnectionStrings__ImageGalleryDBConnectionString="${{ secrets.IMAGEGALLERY_CONNECTION_STRING }}" \
            --from-literal=IdentityServer__SigningCertPath="/certs/imagegallery-signing.pfx" \
            --from-literal=IdentityServer__SigningCertPassword="${{ secrets.IMAGEGALLERY_SIGNING_CERT_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Restore Signing Certificate
        shell: bash
        run: |
          echo "${{ secrets.IMAGEGALLERY_SIGNING_CERT_BASE64 }}" | base64 -d > imagegallery-signing.pfx

      - name: Create IdentityServer Signing Certificate Secret
        shell: bash
        run: |
          kubectl create secret generic imagegallery-signing-cert \
            --namespace imagegallery \
            --from-file=imagegallery-signing.pfx=./imagegallery-signing.pfx \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Application Workloads
        run: |
          kubectl apply -f k8s/aws

      - name: Cleanup Signing Certificate
        shell: bash
        run: |
          rm -f imagegallery-signing.pfx